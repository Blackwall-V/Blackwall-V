<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 460" width="840" height="460"
     role="img" aria-label="Blackwall-V animated banner (dark mode)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="0.5" stop-color="#121833"/>
      <stop offset="1" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2ff"/>
      <stop offset="0.5" stop-color="#b07cff"/>
      <stop offset="1" stop-color="#39e6c9"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(35,46,80,0.65)"/>
      <stop offset="1" stop-color="rgba(20,28,48,0.55)"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.18" cy="0.25" r="0.55">
      <stop offset="0" stop-color="#b07cff" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#b07cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.80" r="0.50">
      <stop offset="0" stop-color="#39e6c9" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#39e6c9" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="rgba(90,120,210,0.07)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background + grid -->
  <rect width="840" height="460" fill="url(#bg)"/>
  <rect width="840" height="460" fill="url(#grid)"/>

  <!-- drifting glow fields -->
  <rect x="-60" y="-40" width="500" height="500" fill="url(#glow1)">
    <animate attributeName="x" values="-60;30;-60" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="y" values="-40;20;-40" dur="16s" repeatCount="indefinite"/>
  </rect>
  <rect x="320" y="-30" width="520" height="520" fill="url(#glow2)">
    <animate attributeName="x" values="320;220;320" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="y" values="-30;30;-30" dur="20s" repeatCount="indefinite"/>
  </rect>

  <!-- floating blurred orbs -->
  <g filter="url(#blur)" opacity="0.55">
    <circle cx="120" cy="395" r="62" fill="#b07cff">
      <animate attributeName="cy" values="395;370;395" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="70" r="52" fill="#39e6c9">
      <animate attributeName="cy" values="70;95;70" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="660" cy="410" r="42" fill="#7aa2ff">
      <animate attributeName="cy" values="410;388;410" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- top accent bar -->
  <rect x="0" y="0" width="840" height="3" fill="url(#accent)">
    <animate attributeName="opacity" values="0.45;1;0.45" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <!-- ASCII glass panel -->
  <rect x="24" y="42" width="653" height="145" rx="18"
        fill="url(#glass)" stroke="rgba(120,140,220,0.35)" stroke-width="1"/>
  <rect x="24" y="42" width="653" height="28" rx="18" fill="rgba(35,46,80,0.65)" opacity="0.5"/>
  <circle cx="44" cy="56" r="5" fill="#ff5f57"/>
  <circle cx="62" cy="56" r="5" fill="#febc2e"/>
  <circle cx="80" cy="56" r="5" fill="#28c840"/>

      <text x="44" y="91.3" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="700" letter-spacing="0.6" fill="#e6ecff" opacity="0">    ____  __    ___   ________ ___       _____    __    __       _    __<animate attributeName="opacity" from="0" to="1" begin="0.15s" dur="0.45s" fill="freeze"/><animate attributeName="opacity" values="1;0.65;1" begin="2s" dur="4.0s" repeatCount="indefinite"/></text>
      <text x="44" y="108.3" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="700" letter-spacing="0.6" fill="#e6ecff" opacity="0">   / __ )/ /   /   | / ____/ //_/ |     / /   |  / /   / /      | |  / /<animate attributeName="opacity" from="0" to="1" begin="0.25s" dur="0.45s" fill="freeze"/><animate attributeName="opacity" values="1;0.65;1" begin="2s" dur="4.4s" repeatCount="indefinite"/></text>
      <text x="44" y="125.3" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="700" letter-spacing="0.6" fill="#e6ecff" opacity="0">  / __  / /   / /| |/ /   / ,&lt;  | | /| / / /| | / /   / /  _____| | / /<animate attributeName="opacity" from="0" to="1" begin="0.35s" dur="0.45s" fill="freeze"/><animate attributeName="opacity" values="1;0.65;1" begin="2s" dur="4.8s" repeatCount="indefinite"/></text>
      <text x="44" y="142.3" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="700" letter-spacing="0.6" fill="#e6ecff" opacity="0"> / /_/ / /___/ ___ / /___/ /| | | |/ |/ / ___ |/ /___/ /__/_____/ |/ /<animate attributeName="opacity" from="0" to="1" begin="0.45s" dur="0.45s" fill="freeze"/><animate attributeName="opacity" values="1;0.65;1" begin="2s" dur="5.2s" repeatCount="indefinite"/></text>
      <text x="44" y="159.3" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="700" letter-spacing="0.6" fill="#e6ecff" opacity="0">/_____/_____/_/  |_\____/_/ |_| |__/|__/_/  |_/_____/_____/     |___/<animate attributeName="opacity" from="0" to="1" begin="0.55s" dur="0.45s" fill="freeze"/><animate attributeName="opacity" values="1;0.65;1" begin="2s" dur="5.6s" repeatCount="indefinite"/></text>

  <!-- right info card -->
  <g>
    <rect x="470" y="60" width="326" height="210" rx="18"
          fill="url(#glass)" stroke="rgba(120,140,220,0.35)" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="490" y="102" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif"
          font-size="13" font-weight="600" fill="#8b97c4" letter-spacing="3">PROFILE</text>
    <text x="490" y="142" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif"
          font-size="28" font-weight="800" fill="#e6ecff">Blackwall-V</text>
    <rect x="490" y="158" width="150" height="3" rx="1.5" fill="url(#accent)">
      <animate attributeName="width" values="0;150;150" keyTimes="0;0.6;1" dur="1.2s" begin="1s" fill="freeze"/>
    </rect>

    <!-- typing prompt -->
    <text x="486" y="232" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
          font-size="17" font-weight="700" fill="#7aa2ff">&gt;</text>
    <!-- typing cursor block -->
    <rect x="498" y="218" width="10" height="18" fill="#39e6c9">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.49;0.5;1" dur="1.05s" repeatCount="indefinite"/>
    </rect>
        <text x="498" y="232" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="17" font-weight="700" fill="#7aa2ff" opacity="0">Data Miner.<animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.0001;0.2344;0.2479;1" dur="9.6s" repeatCount="indefinite"/></text>
        <text x="498" y="232" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="17" font-weight="700" fill="#7aa2ff" opacity="0">ML Engineer.<animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.2501;0.4844;0.4979;1" dur="9.6s" repeatCount="indefinite"/></text>
        <text x="498" y="232" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="17" font-weight="700" fill="#7aa2ff" opacity="0">Linux Ricer.<animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.5001;0.7344;0.7479;1" dur="9.6s" repeatCount="indefinite"/></text>
        <text x="498" y="232" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="17" font-weight="700" fill="#7aa2ff" opacity="0">Rust Enjoyer.<animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.7501;0.9844;0.9979;1" dur="9.6s" repeatCount="indefinite"/></text>

    <!-- status -->
    <circle cx="492" cy="252" r="5" fill="#28c840">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="508" y="256" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif"
          font-size="12" font-weight="500" fill="#8b97c4">Building things with data &amp; code</text>
  </g>

  <!-- pills -->
  <g font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif">
      <g opacity="0"><rect x="44" y="312" width="67" height="28" rx="14" fill="rgba(20,28,48,0.55)" stroke="rgba(120,140,220,0.35)" stroke-width="1"/><text x="56" y="331" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#e6ecff">Python</text><animate attributeName="opacity" from="0" to="1" begin="1.40s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 6;0 0" keyTimes="0;1" begin="1.40s" dur="0.4s" fill="freeze"/></g>
      <g opacity="0"><rect x="121.2" y="312" width="110" height="28" rx="14" fill="rgba(20,28,48,0.55)" stroke="rgba(120,140,220,0.35)" stroke-width="1"/><text x="133.2" y="331" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#e6ecff">Data Science</text><animate attributeName="opacity" from="0" to="1" begin="1.52s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 6;0 0" keyTimes="0;1" begin="1.52s" dur="0.4s" fill="freeze"/></g>
      <g opacity="0"><rect x="241.60000000000002" y="312" width="38" height="28" rx="14" fill="rgba(20,28,48,0.55)" stroke="rgba(120,140,220,0.35)" stroke-width="1"/><text x="253.60000000000002" y="331" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#e6ecff">ML</text><animate attributeName="opacity" from="0" to="1" begin="1.64s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 6;0 0" keyTimes="0;1" begin="1.64s" dur="0.4s" fill="freeze"/></g>
      <g opacity="0"><rect x="290.0" y="312" width="53" height="28" rx="14" fill="rgba(20,28,48,0.55)" stroke="rgba(120,140,220,0.35)" stroke-width="1"/><text x="302.0" y="331" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#e6ecff">Rust</text><animate attributeName="opacity" from="0" to="1" begin="1.76s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 6;0 0" keyTimes="0;1" begin="1.76s" dur="0.4s" fill="freeze"/></g>
      <g opacity="0"><rect x="352.8" y="312" width="60" height="28" rx="14" fill="rgba(20,28,48,0.55)" stroke="rgba(120,140,220,0.35)" stroke-width="1"/><text x="364.8" y="331" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#e6ecff">Linux</text><animate attributeName="opacity" from="0" to="1" begin="1.88s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 6;0 0" keyTimes="0;1" begin="1.88s" dur="0.4s" fill="freeze"/></g>
      <g opacity="0"><rect x="422.8" y="312" width="82" height="28" rx="14" fill="rgba(20,28,48,0.55)" stroke="rgba(120,140,220,0.35)" stroke-width="1"/><text x="434.8" y="331" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#e6ecff">Hyprland</text><animate attributeName="opacity" from="0" to="1" begin="2.00s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 6;0 0" keyTimes="0;1" begin="2.00s" dur="0.4s" fill="freeze"/></g>
  </g>

  <!-- shimmer scanline -->
  <rect x="0" y="0" width="840" height="2" fill="url(#accent)" opacity="0">
    <animate attributeName="y" values="0;460;0" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.35;0" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- footer -->
  <text x="40" y="438" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
        font-size="11" fill="#8b97c4">// prefers-color-scheme: dark</text>
  <text x="800" y="438" text-anchor="end"
        font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
        font-size="11" fill="#8b97c4">github.com/Blackwall-V</text>
</svg>
