  <!-- moving scan beam -->
  <rect x="0" y="0" width="820" height="3" fill="#0a7d28" opacity="0.08">
    <animate attributeName="y" values="0;420;0" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.18;0" dur="9s" repeatCount="indefinite"/>
  </rect>

  <!-- vignette -->
  <rect width="820" height="420" fill="url(#vignette)"/>
</svg>
