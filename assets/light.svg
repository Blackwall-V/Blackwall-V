<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420"
     role="img" aria-label="Blackwall-V terminal (light)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf8ee"/>
      <stop offset="0.5" stop-color="#f4f1e6"/>
      <stop offset="1" stop-color="#fbf8ee"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.75">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.1"/>
    </radialGradient>
    <filter id="bloom" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="820" height="420" fill="url(#bg)"/>

  <!-- drifting phosphor glow blobs -->
  <g filter="url(#soft)" opacity="0.40">
    <circle cx="160" cy="220" r="110" fill="#0a7d28">
      <animate attributeName="cx" values="160;220;160" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="660" cy="180" r="90" fill="#7a4d00" opacity="0.7">
      <animate attributeName="cx" values="660;600;660" dur="22s" repeatCount="indefinite"/>
    </circle>
    <circle cx="540" cy="360" r="80" fill="#1a5a8a" opacity="0.5">
      <animate attributeName="cy" values="360;330;360" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- CRT panel -->
  <rect x="24" y="40" width="772" height="362" rx="12"
        fill="#1a2418" stroke="rgba(20,40,24,0.45)" stroke-width="1.5"/>
  <!-- title bar -->
  <rect x="24" y="40" width="772" height="28" rx="12" fill="#000000" opacity="0.55"/>
  <rect x="24" y="62" width="772" height="6" fill="#000000" opacity="0.55"/>
  <circle cx="42" cy="55" r="5" fill="#ff5f57"/>
  <circle cx="60" cy="55" r="5" fill="#febc2e"/>
  <circle cx="78" cy="55" r="5" fill="#28c840"/>
  <text x="102" y="60" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
        font-size="11" fill="#4a6b58">blackwall@localhost: ~</text>
  <!-- blinking REC dot -->
  <circle cx="774" cy="55" r="4" fill="#ff3b30">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- title -->
  <text x="48" y="64" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
        font-size="18" font-weight="700" fill="#0a7d28" filter="url(#bloom)">blackwall-v</text>
  <rect x="48" y="72" width="120" height="2" fill="#0a7d28" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- typed script -->
  <g opacity="0"><text x="56" y="92" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="700" fill="#7a4d00">$</text><text x="76" y="92" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="700" fill="#0a7d28">whoami</text><animate attributeName="opacity" from="0" to="1" begin="0.40s" dur="0.35s" fill="freeze"/></g>
  <g opacity="0"><text x="76" y="120" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="500" fill="#0a3d1f">blackwall-v  —  data scientist / ml engineer</text><animate attributeName="opacity" from="0" to="1" begin="1.50s" dur="0.35s" fill="freeze"/></g>
  <g opacity="0"><text x="56" y="148" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="700" fill="#7a4d00">$</text><text x="76" y="148" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="700" fill="#0a7d28">cat stack.txt</text><animate attributeName="opacity" from="0" to="1" begin="2.60s" dur="0.35s" fill="freeze"/></g>
  <g opacity="0"><text x="76" y="176" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="500" fill="#0a3d1f">python · pandas · scikit-learn · pycaret</text><animate attributeName="opacity" from="0" to="1" begin="3.70s" dur="0.35s" fill="freeze"/></g>
  <g opacity="0"><text x="76" y="204" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="500" fill="#0a3d1f">rust · lua · linux</text><animate attributeName="opacity" from="0" to="1" begin="4.80s" dur="0.35s" fill="freeze"/></g>
  <g opacity="0"><text x="56" y="232" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="700" fill="#7a4d00">$</text><text x="76" y="232" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="700" fill="#0a7d28">echo $STATUS</text><animate attributeName="opacity" from="0" to="1" begin="5.90s" dur="0.35s" fill="freeze"/></g>
  <g opacity="0"><text x="76" y="260" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="500" fill="#1a5a8a">► open to collaboration</text><animate attributeName="opacity" from="0" to="1" begin="7.00s" dur="0.35s" fill="freeze"/></g>

  <!-- role typing prompt + cycling roles -->
  <text x="56" y="300" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
        font-size="15" font-weight="700" fill="#7a4d00">$</text>
  <rect x="66" y="286" width="9" height="17" fill="#0a7d28" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.95;1" dur="1.05s" repeatCount="indefinite"/>
  </rect>
  <text x="76" y="300" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="700" fill="#1a5a8a" opacity="0">data_scientist<animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.0001;0.2308;0.2462;1" dur="10.4s" repeatCount="indefinite"/></text>
  <text x="76" y="300" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="700" fill="#1a5a8a" opacity="0">ml_engineer<animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.2501;0.4808;0.4962;1" dur="10.4s" repeatCount="indefinite"/></text>
  <text x="76" y="300" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="700" fill="#1a5a8a" opacity="0">python_dev<animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.5001;0.7308;0.7462;1" dur="10.4s" repeatCount="indefinite"/></text>
  <text x="76" y="300" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" font-weight="700" fill="#1a5a8a" opacity="0">open_source<animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.7501;0.9808;0.9962;1" dur="10.4s" repeatCount="indefinite"/></text>

  <!-- status bar -->
  <rect x="24" y="376" width="772" height="26" fill="#000000" opacity="0.5"/>
  <rect x="24" y="376" width="772" height="26" fill="none" stroke="rgba(20,40,24,0.45)" stroke-width="1"/>
  <circle cx="42" cy="389" r="4" fill="#28c840">
